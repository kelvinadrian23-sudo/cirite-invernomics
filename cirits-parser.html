<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analizador CIRBE · Invernomics</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&display=swap');

/* ── PRINT ── */
@media print {
  body { background:#fff !important; color:#111 !important; font-size:10pt; }
  .drop,.actions,.period-tabs,#print-header { display:block !important; }
  .drop { display:none !important; }
  #print-header { display:flex !important; }
  .prod-card,.titular-box,.checklist,.entity-bar,.kpi-row { break-inside:avoid; }
  .kpi-row { display:grid !important; }
  .prod-card { background:#f8f8f8 !important; border:1px solid #ddd !important; color:#111 !important; }
  .prod-name,.prod-desc,.kpi-lbl,.kpi-sub,.amt-lbl { color:#444 !important; }
  .amt-val { color:#111 !important; }
  .actions,.period-tabs { display:none !important; }
  #print-legal { display:block !important; margin-top:16pt; font-size:7.5pt; color:#888; border-top:1px solid #eee; padding-top:8pt; }
  .tag { background:#eee !important; color:#333 !important; border-color:#ccc !important; }
  .entity-bar { background:#f0f0f0 !important; color:#111 !important; border-color:#ddd !important; }
  .incid-banner { background:#fff3f3 !important; color:#c00 !important; border-color:#fcc !important; }
  .cancel-banner { background:#fff8f0 !important; color:#a60 !important; border-color:#fdd !important; }
}

:root {
  --bg:#090c14; --surface:#0f1420; --surface2:#151c2e; --surface3:#1c2540;
  --border:#1e2d4a; --border2:#263550;
  --accent:#3b7eff; --accent-bg:rgba(59,126,255,.10); --accent-br:rgba(59,126,255,.30);
  --green:#10b981; --green-bg:rgba(16,185,129,.08); --green-br:rgba(16,185,129,.25);
  --amber:#f59e0b; --amber-bg:rgba(245,158,11,.08); --amber-br:rgba(245,158,11,.25);
  --red:#ef4444; --red-bg:rgba(239,68,68,.08); --red-br:rgba(239,68,68,.25);
  --orange:#f97316; --blue2:#6366f1; --cyan:#06b6d4;
  --text:#e2e8f5; --text2:#7a8faf; --text3:#3d5070; --muted:#7a8faf;
  --mono:'Geist Mono','IBM Plex Mono',monospace;
  --sans:'Geist','IBM Plex Sans',sans-serif;
  --r:8px; --rl:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;padding-bottom:80px;}

/* ── HEADER ── */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;gap:14px;height:50px;position:sticky;top:0;z-index:100;}
.logo{font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:-.01em;}
.logo span{color:var(--accent);}
.logo-sep{color:var(--text3);margin:0 2px;}
.hbadge{font-family:var(--mono);font-size:10px;background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-br);padding:2px 8px;border-radius:4px;letter-spacing:.08em;text-transform:uppercase;}
.hsp{flex:1;}
.hinfo{font-size:11px;color:var(--text3);font-family:var(--mono);}

/* ── PRINT HEADER ── */
#print-header{display:none;}

/* ── MAIN ── */
main{max-width:940px;margin:0 auto;padding:28px 24px;}

/* ── DROP ZONE ── */
.drop{border:2px dashed var(--border2);border-radius:var(--rl);padding:52px 28px;text-align:center;cursor:pointer;transition:all .2s;background:var(--surface);position:relative;overflow:hidden;}
.drop::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 0,var(--accent-bg),transparent 70%);pointer-events:none;}
.drop:hover,.drop.over{border-color:var(--accent);background:var(--surface2);}
.drop input{display:none;}
.drop-icon{font-size:40px;display:block;margin-bottom:14px;}
.drop-title{font-size:19px;font-weight:700;letter-spacing:-.02em;margin-bottom:6px;}
.drop-sub{color:var(--text2);font-size:12px;font-family:var(--mono);}

/* ── RESULTS ── */
#results{display:none;}

/* ── ENTITY BAR ── */
.entity-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:12px 18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:16px;font-size:13px;}
.entity-bar strong{color:var(--accent);font-family:var(--mono);}
.sep{color:var(--text3);}

/* ── KPIs ── */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;position:relative;overflow:hidden;}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:2px;}
.kpi.g::after{background:var(--green);}
.kpi.a::after{background:var(--amber);}
.kpi.r::after{background:var(--red);}
.kpi.b::after{background:var(--accent);}
.kpi.gold::after{background:var(--amber);}
.kpi-lbl{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--text2);font-family:var(--mono);margin-bottom:6px;}
.kpi-val{font-size:20px;font-weight:700;line-height:1;letter-spacing:-.02em;}
.kpi-val.g{color:var(--green);}
.kpi-val.a{color:var(--amber);}
.kpi-val.r{color:var(--red);}
.kpi-val.b{color:var(--accent);}
.kpi-val.gold{color:var(--amber);}
.kpi-sub{font-size:10px;color:var(--text2);margin-top:4px;}

/* ── ALERTS ── */
.alert{border-radius:var(--r);padding:11px 15px;margin-bottom:10px;font-size:13px;display:flex;align-items:flex-start;gap:10px;border:1px solid;line-height:1.5;}
.alert.ok   {background:var(--green-bg);border-color:var(--green-br);color:#6ee7b7;}
.alert.warn {background:var(--amber-bg);border-color:var(--amber-br);color:#fcd34d;}
.alert.err  {background:var(--red-bg);  border-color:var(--red-br);  color:#fca5a5;}
.alert.info {background:var(--accent-bg);border-color:var(--accent-br);color:#93c5fd;}
.alert-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
.alert strong{font-weight:600;display:block;margin-bottom:2px;}

/* ── SECTIONS ── */
.sec{margin-top:20px;}
.sec-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text2);margin-bottom:12px;display:flex;align-items:center;gap:8px;}

/* ── TITULAR BOX ── */
.titular-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:12px;}
.titular-header{display:flex;align-items:center;gap:12px;padding:12px 18px;background:var(--surface2);border-bottom:1px solid var(--border);flex-wrap:wrap;}
.titular-nif{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--accent);}
.titular-total{font-family:var(--mono);font-size:13px;font-weight:700;margin-left:auto;}
.titular-badge{font-family:var(--mono);font-size:10px;padding:3px 10px;border-radius:5px;font-weight:600;border:1px solid;}
.tb-ok  {background:var(--green-bg);border-color:var(--green-br);color:#6ee7b7;}
.tb-warn{background:var(--amber-bg);border-color:var(--amber-br);color:#fcd34d;}
.tb-err {background:var(--red-bg);  border-color:var(--red-br);  color:#fca5a5;}

/* ── PERIOD TABS ── */
.period-tabs{display:flex;gap:4px;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);}
.ptab{padding:5px 14px;border-radius:5px;font-size:12px;cursor:pointer;color:var(--text2);background:transparent;border:1px solid transparent;font-family:var(--mono);transition:all .15s;}
.ptab.active{background:var(--accent-bg);border-color:var(--accent-br);color:var(--accent);}
.ptab:hover:not(.active){color:var(--text);background:var(--surface2);}
.period-content{display:none;padding:14px;}
.period-content.visible{display:block;}
.no-risk{text-align:center;padding:24px;color:var(--green);font-size:13px;}

/* ── PRODUCT GRID ── */
.prod-grid{display:flex;flex-direction:column;gap:10px;}
.prod-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rl);padding:16px;transition:border-color .15s;}
.prod-card.has-incidencia{border-color:var(--red-br);background:rgba(239,68,68,.04);}
.prod-card.posible-cancelada{border-color:var(--amber-br);opacity:.85;}
.prod-card:hover{border-color:var(--border2);}
.prod-card-top{display:flex;gap:14px;align-items:flex-start;}
.prod-icon{font-size:22px;flex-shrink:0;margin-top:2px;}
.prod-info{flex:1;min-width:0;}
.prod-name{font-size:14px;font-weight:600;margin-bottom:5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.prod-desc{font-size:12px;color:var(--text2);line-height:1.5;}
.prod-amounts{display:flex;gap:12px;flex-shrink:0;flex-wrap:wrap;align-items:flex-start;}
.amt-block{text-align:right;}
.amt-lbl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;}
.amt-val{font-family:var(--mono);font-size:14px;font-weight:700;}
.amt-val.amber{color:var(--amber);}
.amt-val.blue{color:var(--accent);}
.amt-val.red{color:var(--red);}
.amt-val.green{color:var(--green);}
.amt-val.muted{color:var(--text3);}

/* ── CREDIT BAR ── */
.credit-bar-wrap{margin-top:12px;}
.bar-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);font-family:var(--mono);margin-bottom:5px;}
.bar-track{height:5px;background:var(--surface3);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;background:var(--green);transition:width .4s;}
.bar-fill.warn{background:var(--amber);}
.bar-fill.danger{background:var(--red);}

/* ── BANNERS ── */
.incid-banner{display:flex;gap:10px;background:var(--red-bg);border:1px solid var(--red-br);border-radius:var(--r);padding:10px 13px;margin-top:10px;font-size:12px;color:#fca5a5;align-items:flex-start;}
.incid-banner strong{color:var(--red);font-weight:600;}
.cancel-banner{display:flex;gap:10px;background:var(--amber-bg);border:1px solid var(--amber-br);border-radius:var(--r);padding:10px 13px;margin-top:10px;font-size:12px;color:#fcd34d;align-items:flex-start;}
.cancel-banner strong{font-weight:600;}

/* ── TAGS ── */
.prod-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.tag{font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:4px;border:1px solid;}
.tag.blue  {background:var(--accent-bg); border-color:var(--accent-br); color:#93c5fd;}
.tag.amber {background:var(--amber-bg);  border-color:var(--amber-br);  color:#fcd34d;}
.tag.red   {background:var(--red-bg);    border-color:var(--red-br);    color:#fca5a5;}
.tag.gray  {background:rgba(30,45,74,.4);border-color:var(--border);    color:var(--text2);}
.tag.cyan  {background:rgba(6,182,212,.08);border-color:rgba(6,182,212,.25);color:#67e8f9;}
.tag.purple{background:rgba(99,102,241,.1);border-color:rgba(99,102,241,.3);color:#a5b4fc;}
.tag.orange{background:rgba(249,115,22,.08);border-color:rgba(249,115,22,.3);color:#fdba74;}

/* ── CHECKLIST ── */
.checklist{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-top:12px;}
.checklist-header{background:var(--surface2);border-bottom:1px solid var(--border);padding:12px 18px;font-size:12px;font-weight:600;color:var(--green);}
.checklist-body{padding:14px;}
.check-item{display:flex;gap:12px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;line-height:1.5;}
.check-item:last-child{border-bottom:none;padding-bottom:0;}
.check-box{width:20px;height:20px;border:2px solid var(--border2);border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:1px;color:var(--green);transition:all .15s;}
.check-box.checked{background:var(--green-bg);border-color:var(--green-br);}
.check-box:hover{border-color:var(--accent);}
.check-item.priority-high .check-box{border-color:var(--red-br);}
.check-item.priority-med  .check-box{border-color:var(--amber-br);}
.check-text span{color:var(--text2);font-size:12px;}

/* ── ACTIONS ── */
.actions{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;}
.btn{padding:10px 20px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:7px;}
.btn:hover{border-color:var(--border2);background:var(--surface3);}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
.btn.primary:hover{background:#2d6ef0;box-shadow:0 4px 14px rgba(59,126,255,.3);}
.btn.success{background:var(--green-bg);border-color:var(--green-br);color:var(--green);font-weight:600;}
.btn.success:hover{background:rgba(16,185,129,.15);}

/* ── LEGAL PRINT ── */
#print-legal{display:none;font-size:8pt;color:#888;margin-top:16pt;border-top:1px solid #eee;padding-top:8pt;}

@media(max-width:640px){
  .prod-card-top{flex-direction:column;}
  .prod-amounts{flex-direction:row;}
  .kpi-row{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<header>
  <div class="logo">INVERNOMICS<span class="logo-sep"> / </span><span>CIRBE</span></div>
  <div class="hbadge">Analizador CIRITS</div>
  <div class="hsp"></div>
  <span class="hinfo">Datos locales · No se envía nada</span>
</header>

<div id="print-header" style="justify-content:space-between;align-items:flex-start;padding:0 0 12pt 0;border-bottom:2px solid #3b7eff;margin-bottom:16pt;">
  <div>
    <div style="font-size:18pt;font-weight:800;color:#3b7eff;letter-spacing:-0.5px;">INVERNOMICS</div>
    <div style="font-size:8pt;color:#666;margin-top:2pt;">Broker de crédito hipotecario · Registro BdE E331</div>
  </div>
  <div style="text-align:right;">
    <div style="font-size:13pt;font-weight:700;color:#111;">Informe de Riesgos CIRBE</div>
    <div id="print-fecha" style="font-size:8pt;color:#666;margin-top:3pt;"></div>
  </div>
</div>

<main>
  <div class="drop" id="dropZone">
    <input type="file" id="fileInput" accept=".txt,.TXT">
    <span class="drop-icon">📂</span>
    <div class="drop-title">Arrastra el fichero CIRITS aquí</div>
    <div class="drop-sub">CIRITS-EE331_*.TXT · Formato BdE · Procesado localmente</div>
  </div>
  <div id="results"></div>
</main>

<script>
const PLAZO = {
  L01:'< 3 meses', L02:'3–6 meses', L03:'6–12 meses',
  L04:'1–2 años', L05:'2–3 años', L06:'3–5 años',
  L07:'5–10 años', L08:'10–15 años', L09:'15–20 años',
  L10:'> 20 años', L11:'Plazo indeterminado'
};
const PLAZO_CORTO=['L01','L02','L03','L04','L05'];
const PLAZO_MEDIO=['L06','L07'];
const PLAZO_LARGO=['L08','L09','L10','L11'];
const GAR_REAL={G13:'Garantía pignoraticia',G19:'Sin garantía real',G20:'Hipoteca inmobiliaria',G21:'Otra garantía real'};
const GAR_PERS={G01:'Aval AAPP',G10:'Aval particular/empresa',G22:'Aval CESCE',G33:'Aval entidad CIR'};
const COBERTURA={E14:'Cobertura total',E15:'Cobertura parcial'};
const SOLIDARIO={T33:'Riesgo solidario',T34:'Riesgo colectivo'};
const SITUACION={I16:'Reestructurado RDL 6/2012',I17:'Refinanciado',I18:'Convenio acreedores',I19:'Incumplimiento 90 días–4 años',I20:'Incumplimiento > 4 años',I21:'En suspenso'};
const NATURALEZA={T11:'Titular directo',T19:'Garante / avalista',T22:'Compromiso de firma'};
const TIPO_PROD={V32:'Crédito financiero',V55:'Aval financiero',V63:'Aval no financiero',V68:'Depósito',V74:'Derivado'};

const fmt = (miles) => miles>0 ? new Intl.NumberFormat('es-ES',{style:'currency',currency:'EUR',minimumFractionDigits:0,maximumFractionDigits:0}).format(miles*1000) : '—';
const fmtPer = p => { if(!p||p.length<6) return p; const m=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic']; return `${m[parseInt(p.substring(4,6))-1]} ${p.substring(0,4)}`; };

function clasificar(r) {
  const { tipoProd, plazo, garReal, cobReal, garPers, importes, solidario, naturaleza } = r;
  const disp  = importes.dispuesto  || 0;
  const dispo = importes.disponible || 0;
  const total = disp + dispo;

  if (solidario) return {
    icon:'🤝', tipo:'solidario', color:'purple',
    nombre:'Deuda solidaria / riesgo compartido',
    pista:`Aparece como ${solidario==='T33'?'riesgo solidario':'riesgo colectivo'} con ${r.numPart} partícipes. El cliente puede ser cotitular o avalista. ⚠️ Verificar si es titular principal o avalista — cambia cómo lo computa el banco.`,
    docsPedir:['Contrato del préstamo para confirmar si es titular o avalista','Si es solo avalista: acreditar que el titular principal paga correctamente']
  };

  if (naturaleza === 'T19') return {
    icon:'🛡️', tipo:'garante', color:'purple',
    nombre:'Riesgo como avalista / garante',
    pista:'El cliente figura como garante o avalista, NO como deudor principal. Computa en CIRBE pero no es su deuda directa.',
    docsPedir:['Contrato donde consta como avalista','Acreditar que el titular principal está al corriente de pago']
  };

  if (tipoProd === 'V55') return { icon:'🛡️', tipo:'aval', color:'purple', nombre:'Aval financiero prestado', pista:'El cliente ha prestado un aval financiero. Computa como riesgo pero no es deuda directa suya.', docsPedir:['Contrato de aval'] };
  if (tipoProd === 'V63') return { icon:'📋', tipo:'aval', color:'purple', nombre:'Aval técnico / no financiero', pista:'Aval de obra o técnico. Riesgo financiero bajo.', docsPedir:[] };

  if (garReal === 'G20') {
    if (disp < 1) return { icon:'🏠', tipo:'hipoteca_cancelada', color:'orange', nombre:'Hipoteca inmobiliaria', pista:'Aparece con importe cero o residual. Posiblemente cancelada recientemente. El banco puede tardar hasta 1 mes en comunicarlo al BdE.', cancelada:true, docsPedir:['Nota simple del Registro','Certificado de cancelación del banco'] };
    return { icon:'🏠', tipo:'hipoteca', color:'blue', nombre:'Hipoteca inmobiliaria', pista:`Préstamo con garantía hipotecaria sobre inmueble.${cobReal==='E14'?' Cobertura total.':cobReal==='E15'?' Cobertura parcial.':''} Verificar si es vivienda habitual, segunda residencia o inversión.`, docsPedir:['Escritura de hipoteca o cuadro de amortización','Certificado de saldo pendiente','Último recibo pagado'] };
  }

  if (garReal === 'G21') return {
    icon:'🚗', tipo:'garantia_real', color:'amber',
    nombre:'Préstamo con garantía real (no hipotecaria)',
    pista:`Crédito con garantía real sobre un activo (habitual en vehículos, maquinaria o leasing). ⚠️ El plazo del CIRBE (${PLAZO[plazo]||plazo}) es el del contrato original, no el residual real. Verificar con el cliente qué financia y cuándo vence.${cobReal?' Cobertura: '+(COBERTURA[cobReal]||cobReal)+'.':''}`,
    docsPedir:['Contrato del préstamo / financiación','Saldo pendiente actualizado','Confirmar fecha de vencimiento real']
  };

  if (garReal === 'G13') return { icon:'📊', tipo:'pignoracion', color:'cyan', nombre:'Préstamo con garantía pignoraticia', pista:'Respaldado por depósito, valores u otro activo pignorado. Riesgo bajo si el activo cubre el importe.', docsPedir:['Contrato','Extracto del activo pignorado'] };

  if (dispo > 0) {
    const usoPct = total>0 ? Math.round(disp/total*100) : 0;
    if (total <= 12 || disp === 0) return { icon:'💳', tipo:'tarjeta', color:'amber', nombre:'Tarjeta de crédito', pista:`Límite: ${fmt(total)}  ·  Utilizado: ${fmt(disp)} (${usoPct}%)  ·  Disponible: ${fmt(dispo)}. ⚠️ Los bancos computan el límite total como riesgo. Si no se usa, valorar cancelarla antes de presentar.`, docsPedir:['Extracto de la tarjeta (límite y saldo actual)','Valorar cancelación o reducción de límite si no se usa'] };
    return { icon:'💳', tipo:'linea', color:'amber', nombre:'Línea de crédito / póliza de crédito', pista:`Límite: ${fmt(total)}  ·  Dispuesto: ${fmt(disp)}  ·  Disponible: ${fmt(dispo)}. ⚠️ Los bancos computan el límite total.`, docsPedir:['Contrato de la línea de crédito','Extracto actualizado'] };
  }

  return {
    icon:'💰', tipo:'personal', color:'amber',
    nombre:'Préstamo personal / consumo',
    pista:`Préstamo sin garantía real. ⚠️ El plazo del CIRBE (${PLAZO[plazo]||plazo}) es el del contrato original declarado por el banco y puede no coincidir con el plazo real. Verificar tipo, importe y vencimiento real con el cliente.`,
    docsPedir:['Contrato del préstamo','Saldo pendiente actualizado','Último recibo pagado','Confirmar fecha de vencimiento real']
  };
}

function parseCIRITS(buffer) {
  const text = new TextDecoder('iso-8859-1').decode(buffer);
  const lines = text.split(/\r\n|\r|\n/).filter(l => l.trim());
  const result = { entidad:{}, titulares:{} };
  for (const line of lines) {
    const tipo = line.substring(0,5);
    if (tipo === 'AI000') {
      result.entidad = { codigo:line.substring(5,9).trim(), nombre:line.substring(9,59).trim(), numRegistros:parseInt(line.substring(76,80).trim())||0 };
    } else if (tipo === 'CI001') {
      const titular=line.substring(9,20).trim(), periodo=line.substring(20,26).trim();
      const naturaleza=line.substring(26,29).trim(), solidario=line.substring(29,32).trim();
      const numPart=parseInt(line.substring(32,42).trim()||'0');
      const tipoProd=line.substring(42,45).trim(), moneda=line.substring(45,48).trim();
      const plazo=line.substring(48,51).trim(), garReal=line.substring(51,54).trim();
      const cobReal=line.substring(54,57).trim(), garPers=line.substring(57,60).trim(), cobPers=line.substring(60,63).trim();
      const rawStr=line.substring(63).replace(/\s/g,'');
      const sitCode=/^(I\d{2})/.test(rawStr)?rawStr.substring(0,3):'';
      const rawNum=sitCode?rawStr.substring(3):rawStr;
      const imp=n=>{const s=rawNum.substring(n*12,(n+1)*12);return s&&/^\d+$/.test(s.trim())?parseInt(s,10):0;};
      const importes={dispuesto:imp(0),dispuestoVencido:imp(1),dispuestoDemora:imp(2),disponible:imp(3),disponibleVencido:imp(4),disponibleDemora:imp(5)};
      if(!result.titulares[titular])result.titulares[titular]={};
      if(!result.titulares[titular][periodo])result.titulares[titular][periodo]=[];
      result.titulares[titular][periodo].push({naturaleza,solidario,numPart,tipoProd:sitCode?'V32':tipoProd,situacion:sitCode||'',moneda,plazo,garReal,cobReal,garPers,cobPers,importes});
    } else if (tipo === 'CI002') {
      const titular=line.substring(9,20).trim(), periodo=line.substring(20,26).trim();
      if(!result.titulares[titular])result.titulares[titular]={};
      if(!result.titulares[titular][periodo])result.titulares[titular][periodo]=[];
      result.titulares[titular][periodo].push({sinRiesgos:true});
    }
  }
  return result;
}

function render(data) {
  const cont = document.getElementById('results');
  cont.style.display = 'block';

  const todosLimpios = Object.values(data.titulares).every(p => Object.values(p).every(regs => regs.every(r => r.sinRiesgos)));

  if (todosLimpios) {
    const nifs = Object.keys(data.titulares).join(', ');
    const periods = [...new Set(Object.values(data.titulares).flatMap(p=>Object.keys(p)))].sort().reverse().map(fmtPer).join(' · ');
    cont.innerHTML = `
      <div class="entity-bar"><span>Entidad: <strong>${data.entidad.codigo}</strong></span><span class="sep">·</span><span><strong>${data.entidad.nombre}</strong></span></div>
      <div style="background:var(--green-bg);border:1px solid var(--green-br);border-radius:var(--rl);padding:48px 32px;text-align:center;margin-top:8px;">
        <div style="font-size:44px;margin-bottom:14px;">✅</div>
        <div style="font-size:22px;font-weight:800;color:var(--green);margin-bottom:8px;letter-spacing:-.02em;">Sin deudas en CIRBE</div>
        <div style="color:var(--text2);font-size:14px;margin-bottom:6px;">El titular <strong style="color:var(--text);font-family:var(--mono)">${nifs}</strong> no figura con ninguna operación activa en la CIR del Banco de España.</div>
        <div style="color:var(--text3);font-size:12px;margin-top:8px;font-family:var(--mono)">Períodos consultados: ${periods}</div>
      </div>
      <div class="alert ok" style="margin-top:14px;"><span class="alert-icon">💡</span><div><strong>Perfil limpio — favorable para la operación</strong>Sin deudas, hipotecas ni tarjetas declaradas. Puedes proceder con el análisis de ingresos.</div></div>
      <div class="actions"><button class="btn" onclick="location.reload()">↩ Cargar otro fichero</button></div>`;
    return;
  }

  let totalDisp=0,totalDispo=0,totalVenc=0,nHipotecas=0,nPersonales=0,nTarjetas=0,nIncidencias=0;
  const allDocs=new Set();
  for(const[,periodos]of Object.entries(data.titulares)){
    const pLast=Object.keys(periodos).sort().reverse()[0];
    for(const r of periodos[pLast]||[]){
      if(r.sinRiesgos||r.solidario)continue;
      const venc=(r.importes.dispuestoVencido||0)+(r.importes.disponibleVencido||0);
      totalDisp+=r.importes.dispuesto||0; totalDispo+=r.importes.disponible||0; totalVenc+=venc;
      if(venc>0||r.situacion)nIncidencias++;
      const cls=clasificar(r);
      if(['hipoteca','hipoteca_probable','hipoteca_cancelada'].includes(cls.tipo))nHipotecas++;
      else if(['tarjeta','linea'].includes(cls.tipo))nTarjetas++;
      else if(['personal','coche','garantia_real'].includes(cls.tipo))nPersonales++;
      cls.docsPedir.forEach(d=>allDocs.add(d));
    }
  }

  let html='';
  html+=`<div class="entity-bar"><span>Entidad: <strong>${data.entidad.codigo}</strong></span><span class="sep">·</span><span><strong>${data.entidad.nombre}</strong></span><span class="sep">·</span><span>Titulares: <strong>${Object.keys(data.titulares).length}</strong></span><span class="sep">·</span><span>Registros: <strong>${data.entidad.numRegistros}</strong></span></div>`;

  const kpiDeudaColor=totalVenc>0?'r':totalDisp>200?'a':'gold';
  html+=`<div class="kpi-row">
    <div class="kpi ${kpiDeudaColor}"><div class="kpi-lbl">Deuda total activa</div><div class="kpi-val ${kpiDeudaColor}" style="font-size:${totalDisp>9999?'17px':'22px'}">${fmt(totalDisp)}</div><div class="kpi-sub">período más reciente</div></div>
    <div class="kpi b"><div class="kpi-lbl">Crédito disponible</div><div class="kpi-val b" style="font-size:${totalDispo>9999?'17px':'22px'}">${totalDispo>0?fmt(totalDispo):'—'}</div><div class="kpi-sub">líneas abiertas</div></div>
    <div class="kpi ${totalVenc>0?'r':'g'}"><div class="kpi-lbl">Importes vencidos</div><div class="kpi-val ${totalVenc>0?'r':'g'}">${totalVenc>0?fmt(totalVenc):'Ninguno'}</div><div class="kpi-sub">${totalVenc>0?'⚠ Revisar urgente':'sin incidencias'}</div></div>
    <div class="kpi ${nHipotecas>0?'b':'g'}"><div class="kpi-lbl">Hipotecas</div><div class="kpi-val ${nHipotecas>0?'b':'g'}">${nHipotecas}</div><div class="kpi-sub">${nHipotecas===0?'sin hipotecas':nHipotecas===1?'detectada':'detectadas'}</div></div>
    <div class="kpi ${nPersonales>0?'a':'g'}"><div class="kpi-lbl">Préstamos</div><div class="kpi-val ${nPersonales>0?'a':'g'}">${nPersonales}</div><div class="kpi-sub">${nPersonales===0?'ninguno':'verificar con cliente'}</div></div>
    <div class="kpi ${nTarjetas>0?'a':'g'}"><div class="kpi-lbl">Tarjetas / líneas</div><div class="kpi-val ${nTarjetas>0?'a':'g'}">${nTarjetas}</div><div class="kpi-sub">${nTarjetas===0?'ninguna':'computa el límite'}</div></div>
  </div>`;

  if(totalVenc>0) html+=`<div class="alert err"><span class="alert-icon">🚨</span><div><strong>Importes vencidos — requiere acción inmediata</strong>Se detectan ${fmt(totalVenc)} en pagos vencidos o impagados. Solicitar aclaración antes de presentar a ningún banco.</div></div>`;
  if(nHipotecas>0) html+=`<div class="alert info"><span class="alert-icon">🏠</span><div><strong>${nHipotecas} hipoteca${nHipotecas>1?'s':''} detectada${nHipotecas>1?'s':''}</strong>Verificar si la mantiene (vivienda/inversión) o fue cancelada recientemente. En caso de cancelación, pedir nota simple y certificado del banco.</div></div>`;
  if(nTarjetas>0) html+=`<div class="alert warn"><span class="alert-icon">💳</span><div><strong>Tarjetas / líneas de crédito abiertas</strong>Los bancos computan el límite total como riesgo. Si no las usa, recomendar cancelarlas antes de presentar la operación.</div></div>`;
  html+=`<div class="alert info" style="background:rgba(30,45,74,.3);border-color:var(--border);color:var(--text2)"><span class="alert-icon">ℹ️</span><div>El CIRBE es un informe <strong style="color:var(--text)">agregado</strong> — puede agrupar varios préstamos en una sola línea. El plazo declarado es el del contrato original, no el residual real. La clasificación de producto es orientativa.</div></div>`;

  html+=`<div class="sec"><div class="sec-title">Detalle por titular</div>`;
  for(const[titular,periodos]of Object.entries(data.titulares)){
    const periods=Object.keys(periodos).sort();
    const pLast=[...periods].reverse()[0];
    const regsLast=periodos[pLast]||[];
    const sinRiesgos=regsLast.every(r=>r.sinRiesgos);
    let totalTitDisp=0,totalTitVenc=0;
    for(const r of regsLast){if(r.sinRiesgos||r.solidario)continue;totalTitDisp+=r.importes.dispuesto||0;totalTitVenc+=(r.importes.dispuestoVencido||0)+(r.importes.disponibleVencido||0);}
    const badgeClass=sinRiesgos?'tb-ok':totalTitVenc>0?'tb-err':'tb-warn';
    const badgeText=sinRiesgos?'✓ Sin deudas':totalTitVenc>0?'🚨 Con vencidos':'⚠ Activo';
    html+=`<div class="titular-box"><div class="titular-header"><span class="titular-nif">${titular}</span><span style="font-size:12px;color:var(--text2);font-family:var(--mono)">Datos a ${fmtPer(pLast)}</span>${totalTitDisp>0?`<span class="titular-total" style="color:${totalTitVenc>0?'var(--red)':'var(--amber)'}">${fmt(totalTitDisp)}</span>`:''}<span class="titular-badge ${badgeClass}">${badgeText}</span></div>`;
    if(periods.length>1){html+=`<div class="period-tabs">`;for(const p of [...periods].reverse())html+=`<div class="ptab${p===pLast?' active':''}" onclick="switchPeriod('${titular}','${p}')" data-t="${titular}" data-p="${p}">${fmtPer(p)}</div>`;html+=`</div>`;}
    for(const period of periods){
      const regs=periodos[period];const isV=period===pLast;
      html+=`<div class="period-content${isV?' visible':''}" id="pc_${titular}_${period}">`;
      if(regs.every(r=>r.sinRiesgos)){html+=`<div class="no-risk">✅ Sin riesgos declarados en CIRBE para este período</div>`;}
      else{
        html+=`<div class="prod-grid">`;
        for(const r of regs){
          if(r.sinRiesgos)continue;
          const cls=clasificar(r);
          const venc=(r.importes.dispuestoVencido||0)+(r.importes.disponibleVencido||0);
          const disp=r.importes.dispuesto||0,dispo=r.importes.disponible||0,total=disp+dispo;
          const pct=total>0?Math.round(disp/total*100):0;
          const showBar=dispo>0&&total>0;
          const barClass=pct>80?'danger':pct>50?'warn':'';
          const xc=[venc>0||r.situacion?'has-incidencia':'',cls.cancelada?'posible-cancelada':''].filter(Boolean).join(' ');
          const tags=[];
          tags.push(`<span class="tag blue">${PLAZO[r.plazo]||r.plazo}</span>`);
          if(r.garReal&&r.garReal!=='G19')tags.push(`<span class="tag blue">${GAR_REAL[r.garReal]||r.garReal}${r.cobReal?' · '+(COBERTURA[r.cobReal]||r.cobReal):''}</span>`);
          if(r.garPers)tags.push(`<span class="tag amber">${GAR_PERS[r.garPers]||r.garPers}${r.cobPers?' · '+(COBERTURA[r.cobPers]||r.cobPers):''}</span>`);
          if(r.moneda&&r.moneda!=='EUR')tags.push(`<span class="tag gray">${r.moneda}</span>`);
          if(r.solidario)tags.push(`<span class="tag cyan">${SOLIDARIO[r.solidario]||r.solidario} · ${r.numPart} partíc.</span>`);
          if(r.naturaleza&&r.naturaleza!=='T11')tags.push(`<span class="tag purple">${NATURALEZA[r.naturaleza]||r.naturaleza}</span>`);
          if(r.situacion)tags.push(`<span class="tag red">⚠ ${SITUACION[r.situacion]||r.situacion}</span>`);
          html+=`<div class="prod-card ${xc}">
            <div class="prod-card-top">
              <div class="prod-icon">${cls.icon}</div>
              <div class="prod-info">
                <div class="prod-name">${cls.nombre}${cls.cancelada?` <span style="font-size:10px;background:var(--amber-bg);color:var(--amber);padding:2px 7px;border-radius:4px;border:1px solid var(--amber-br);">POSIBLE CANCELADA</span>`:''}</div>
                <div class="prod-desc">${cls.pista}</div>
              </div>
              <div class="prod-amounts">
                ${disp>0?`<div class="amt-block"><div class="amt-lbl">Pendiente</div><div class="amt-val amber">${fmt(disp)}</div></div>`:''}
                ${dispo>0?`<div class="amt-block"><div class="amt-lbl">Disponible</div><div class="amt-val blue">${fmt(dispo)}</div></div>`:''}
                ${dispo>0?`<div class="amt-block"><div class="amt-lbl">Límite</div><div class="amt-val">${fmt(total)}</div></div>`:''}
                ${venc>0?`<div class="amt-block"><div class="amt-lbl">⚠ Vencido</div><div class="amt-val red">${fmt(venc)}</div></div>`:''}
                ${disp===0&&dispo===0?`<div class="amt-block"><div class="amt-lbl">Importe</div><div class="amt-val muted">—</div></div>`:''}
              </div>
            </div>
            ${showBar?`<div class="credit-bar-wrap"><div class="bar-labels"><span>Usado: ${fmt(disp)} (${pct}%)</span><span>Límite: ${fmt(total)}</span></div><div class="bar-track"><div class="bar-fill ${barClass}" style="width:${pct}%"></div></div></div>`:''}
            ${venc>0?`<div class="incid-banner"><span>🚨</span><div><strong>Impago / vencido: ${fmt(venc)}</strong> — Pedir explicación al cliente. ${r.situacion?SITUACION[r.situacion]+'.':''} Puede bloquear la aprobación bancaria.</div></div>`:''}
            ${cls.cancelada?`<div class="cancel-banner"><span>⚠️</span><div><strong>Posible hipoteca cancelada</strong> — Si el cliente vendió el inmueble, pedir nota simple del registro y certificado de cancelación del banco.</div></div>`:''}
            ${tags.length?`<div class="prod-tags">${tags.join('')}</div>`:''}
          </div>`;
        }
        html+=`</div>`;
      }
      html+=`</div>`;
    }
    html+=`</div>`;
  }
  html+=`</div>`;

  // Checklist
  const checkItems=[];
  if(totalVenc>0)checkItems.push({text:'<strong>Justificación de importes vencidos o impagados</strong> <span>— Extracto bancario + explicación escrita del cliente</span>',priority:'high'});
  if(nHipotecas>0){checkItems.push({text:'<strong>Escritura de hipoteca o certificado de saldo pendiente</strong> <span>— Para confirmar importe y cuota actual</span>',priority:'high'});checkItems.push({text:'<strong>Recibo del último pago de la hipoteca</strong> <span>— Confirma que está al corriente</span>',priority:'med'});}
  let hayCancel=false;
  for(const[,periodos]of Object.entries(data.titulares)){const pL=Object.keys(periodos).sort().reverse()[0];for(const r of periodos[pL]||[]){if(clasificar(r).cancelada){hayCancel=true;break;}}}
  if(hayCancel){checkItems.push({text:'<strong>Nota simple del Registro de la Propiedad</strong> <span>— Para confirmar cancelación registral</span>',priority:'high'});checkItems.push({text:'<strong>Certificado de cancelación de hipoteca</strong> <span>— Emitido por el banco</span>',priority:'high'});}
  if(nPersonales>0)checkItems.push({text:'<strong>Contratos de préstamos personales / consumo</strong> <span>— Para cruzar importes con el CIRBE y confirmar cuotas</span>',priority:'med'});
  if(nTarjetas>0)checkItems.push({text:'<strong>Extractos de tarjetas de crédito</strong> <span>— Límite actual y saldo. Valorar cancelación</span>',priority:'med'});
  checkItems.push({text:'<strong>Cruzar todos los importes del CIRBE con lo declarado por el cliente</strong> <span>— Cualquier diferencia debe tener explicación documentada</span>',priority:'med'});
  checkItems.push({text:'<strong>Confirmar si hay deudas de empresa mezcladas con personales</strong> <span>— Si es autónomo o socio, puede haber riesgo empresarial</span>',priority:'low'});

  html+=`<div class="sec"><div class="sec-title">📋 Documentación a pedir al cliente</div><div class="checklist"><div class="checklist-header">✅ Checklist — verificar antes de presentar al banco</div><div class="checklist-body" id="checklistBody">`;
  for(let i=0;i<checkItems.length;i++){const item=checkItems[i];const pc=item.priority==='high'?'priority-high':item.priority==='med'?'priority-med':'';html+=`<div class="check-item ${pc}"><div class="check-box" id="cb_${i}" onclick="toggleCheck(${i})">&nbsp;</div><div class="check-text">${item.text}</div></div>`;}
  html+=`</div></div></div>`;

  html+=`<div class="actions">
    <button class="btn primary" onclick="copiarResumen()">📋 Copiar resumen para Bitrix24</button>
    <button class="btn success" onclick="generarPDF()">⬇ Descargar PDF para cliente</button>
    <button class="btn" onclick="location.reload()">↩ Cargar otro fichero</button>
  </div>`;

  cont.innerHTML=html;
  window._data=data;
}

function switchPeriod(titular,periodo){
  document.querySelectorAll(`[id^="pc_${titular}_"]`).forEach(el=>el.classList.remove('visible'));
  document.getElementById(`pc_${titular}_${periodo}`)?.classList.add('visible');
  document.querySelectorAll(`.ptab[data-t="${titular}"]`).forEach(el=>{el.classList.toggle('active',el.dataset.p===periodo);});
}

function toggleCheck(i){
  const cb=document.getElementById('cb_'+i);if(!cb)return;
  const checked=cb.classList.toggle('checked');cb.textContent=checked?'✓':' ';
}

function copiarResumen(){
  const d=window._data;if(!d)return;
  let txt=`=== ANÁLISIS CIRBE — INVERNOMICS ===\nFecha análisis: ${new Date().toLocaleDateString('es-ES')}\nEntidad: ${d.entidad.nombre}\n\n`;
  for(const[titular,periodos]of Object.entries(d.titulares)){
    const pLast=Object.keys(periodos).sort().reverse()[0];
    const regs=periodos[pLast]||[];
    txt+=`━━━ TITULAR: ${titular} (datos a ${fmtPer(pLast)}) ━━━\n`;
    if(regs.every(r=>r.sinRiesgos)){txt+=`  ✅ Sin deudas en CIRBE\n\n`;continue;}
    let totalTit=0;
    for(const r of regs){
      if(r.sinRiesgos)continue;
      const cls=clasificar(r);
      const venc=(r.importes.dispuestoVencido||0)+(r.importes.disponibleVencido||0);
      const disp=r.importes.dispuesto||0,dispo=r.importes.disponible||0;
      totalTit+=disp;
      txt+=`  ${cls.icon} ${cls.nombre}`;
      if(cls.cancelada)txt+=` [POSIBLE CANCELADA]`;
      txt+=`\n     Pendiente: ${fmt(disp)}`;
      if(dispo>0)txt+=`  |  Disponible: ${fmt(dispo)}  |  Límite: ${fmt(disp+dispo)}`;
      txt+=`  |  Plazo CIRBE: ${PLAZO[r.plazo]||r.plazo}`;
      if(r.garReal!=='G19')txt+=`  |  ${GAR_REAL[r.garReal]||r.garReal}`;
      if(venc>0)txt+=`\n     ⚠ VENCIDO: ${fmt(venc)}`;
      if(r.situacion)txt+=`\n     ⚠ SITUACIÓN: ${SITUACION[r.situacion]||r.situacion}`;
      txt+=`\n     Pista: ${cls.pista}\n\n`;
    }
    txt+=`  TOTAL TITULAR: ${fmt(totalTit)}\n\n`;
  }
  navigator.clipboard.writeText(txt).then(()=>{
    const b=document.querySelector('.btn.primary');const orig=b.textContent;
    b.textContent='✓ Copiado al portapapeles';setTimeout(()=>b.textContent=orig,2500);
  });
}

function generarPDF(){
  const d=window._data;if(!d)return;
  const hoy=new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'long',year:'numeric'});
  const pf=document.getElementById('print-fecha');if(pf)pf.textContent='Generado el '+hoy;
  let legal=document.getElementById('print-legal');
  if(!legal){legal=document.createElement('div');legal.id='print-legal';legal.style.display='none';legal.innerHTML='Este informe es un análisis orientativo elaborado por Broker Invernomics SL a partir del fichero CIRITS del Banco de España. La clasificación de productos es estimada y no constituye dictamen vinculante. Importes en miles de euros. Documento confidencial.';document.getElementById('results').appendChild(legal);}
  const nif=Object.keys(d.titulares)[0]||'cliente';
  const titleOrig=document.title;
  document.title=`CIRBE_Invernomics_${nif}_${new Date().toISOString().slice(0,10)}`;
  window.print();
  setTimeout(()=>{document.title=titleOrig;},1000);
}

const dz=document.getElementById('dropZone');
const fi=document.getElementById('fileInput');
dz.addEventListener('click',()=>fi.click());
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over');});
dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over');if(e.dataTransfer.files[0])process(e.dataTransfer.files[0]);});
fi.addEventListener('change',()=>{if(fi.files[0])process(fi.files[0]);});

function process(file){
  const r=new FileReader();
  r.onload=e=>{try{const data=parseCIRITS(e.target.result);render(data);dz.style.display='none';}catch(err){alert('Error al procesar el fichero: '+err.message);}};
  r.readAsArrayBuffer(file);
}
</script>
